<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bedankt! | Stoopwebsites</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;700;900&display=swap');
        body { font-family: 'Space Grotesk', sans-serif; background-color: #0b0d10; color: #ffffff; }
        .sw-orange { color: #E8601A; }
        .sw-bg-orange { background-color: #E8601A; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center px-6 text-center">
    <div class="max-w-xl">
        <div class="mb-8 inline-flex items-center justify-center w-24 h-24 rounded-full bg-[#E8601A]/10 border border-[#E8601A]/20">
            <i class="fa-solid fa-check text-4xl sw-orange"></i>
        </div>
        <h1 class="text-5xl md:text-6xl font-black mb-6 uppercase italic tracking-tighter">Bericht <span class="sw-orange">ontvangen!</span></h1>
        <p class="text-gray-400 text-lg font-light mb-12 leading-relaxed">
            Bedankt voor je bericht! Ik heb je aanvraag in goede orde ontvangen en neem zo snel mogelijk contact met je op.
        </p>
        <a href="index.html" class="sw-bg-orange text-white px-12 py-5 rounded-full font-black uppercase text-[12px] tracking-[0.2em] transition-all hover:scale-105 inline-block italic shadow-2xl">
            Terug naar home
        </a>
    </div>
</body>
</html>
